# Platform-default workflow — ships to every org with Telegram connected.
# When an opportunity is marked won, notify the configured Telegram chat(s).

name: Deal ganho — Notificar Telegram
description: |
  Platform-default. Quando uma oportunidade é movida para um stage com
  is_won=true, envia notificação no Telegram com nome do contato, valor e
  título da oportunidade.
trigger:
  type: event
  event: opportunity.won

nodes:
  - id: notify
    kind: send_telegram_notification
    integration: telegram
    text: |
      🏆 <b>Deal Ganho!</b>
      👤 {{contact.name}}
      💰 R$ {{opportunity.value}}
      📋 {{opportunity.title}}
    parse_mode: HTML

edges:
  - from: trigger
    to: notify
